name: Generate PDF — English

on:
  push:
    branches: [main]
    paths:
      - 'markdown/english/**.md'
      - 'images/**'
      - 'publishing/make_pdf_book_english.py'
      - 'publishing/book_english.css'
      - 'publishing/VERSION'
  workflow_dispatch:

jobs:
  generate-pdf-english:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for accurate commit count

      - name: Compute semantic version
        run: |
          MAJOR_MINOR=$(cat publishing/VERSION)
          PATCH=$(git rev-list --count HEAD)
          RELEASE_VERSION="v${MAJOR_MINOR}.${PATCH}"
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> $GITHUB_ENV
          echo "Computed version: ${RELEASE_VERSION}"

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: pip
          cache-dependency-path: publishing/requirements.txt

      - name: Install system dependencies for WeasyPrint
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libpango-1.0-0 libpangoft2-1.0-0 \
            libcairo2 libgobject-2.0-0 \
            libharfbuzz0b libfribidi0 \
            fontconfig

      - name: Install Python dependencies
        run: pip install -r publishing/requirements.txt

      - name: Download images from Google Drive
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python3.9 -c "
          import sys; sys.path.insert(0, 'publishing')
          from make_pdf_book import sync_images_from_gdrive
          sync_images_from_gdrive()
          "

      - name: Build English/Devanagari edition — A4
        run: python3.9 publishing/make_pdf_book_english.py

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: "Ganapati Sambavam ${{ env.RELEASE_VERSION }}"
          body: |
            Auto-generated English/Devanagari edition PDF from the latest markdown content.

            | File | Description |
            |------|-------------|
            | `ganapati_sambhavam_english.pdf` | English/Devanagari edition (A4) |

            (Telugu-edition PDFs are published separately by the
            "Generate PDF — Telugu" workflow; see other release assets.)

            **Commit:** ${{ github.sha }}
            **Triggered by:** ${{ github.event_name }}
          files: pdfs/ganapati_sambhavam_english.pdf
          make_latest: true
