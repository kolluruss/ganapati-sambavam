book:
  title: గణపతి సంభవం
  title_transliteration: Ganapati Sambhavam
  language: Telugu
  total_sargas: 10
sargas:
- number: 1
  name: హిమగిరి పరిచయము
  title: హిమగిరిపరిచయోనామ ప్రథమః సర్గః
  description: ఉత్తరదిశకు రక్షగా నిలచిన హిమగిరి వైభవము, కాశ్మీర్-నేపాల్ దేశముల ప్రకృతి సౌందర్యము, అమరనాథ్, పశుపతినాథ్, కేదారనాథ్,
    బద్రీనాథ్ పుణ్యక్షేత్రముల మహిమ మరియు హిమాలయ తీరమందు సేవలో నిలచిన భారత వీరభటుల వర్ణన.
  end_matter: "మ. మ. వి. వా. కవిశిరోమణినా అలవరతతారపురాభిజనేన దిల్లీనివాసినా \n పం. ప్రభుదత్త శాస్త్రిణా ప్రణీతే ‘గణపతి సమ్భవే’\
    \ హిమగిరిపరిచయోనామ ప్రథమః సర్గః సమాప్తః ।"
  name_transliteration: Himagiri Parichayamu
  shloka_range:
    start: 1
    end: 98
  topics:
  - number: 1
    name: హిమాలయపర్వత వర్ణన
    shloka_range:
      start: 1
      end: 22
    description: హిమాలయపర్వతాన్ని భారతీయ వృద్ధునిగా, పశుపక్ష్యాదుల ఆవాసంగా వర్ణించుట.
  - number: 2
    name: కాశ్మీర్ దేశ వర్ణన
    shloka_range:
      start: 23
      end: 24
    description: హిమాలయానికి వక్షస్థలం వంటి కాశ్మీర్ సోయగాలు.
  - number: 3
    name: కేశర్ (కుంకుమపువ్వు)
    shloka_range:
      start: 25
      end: 28
    description: సూర్య కిరణాల వలె మెరిసే కేశర్ (కుంకుమపువ్వు) మరియు దాని వివిధ పేర్ల వివరణ.
  - number: 4
    name: జీలమ్ నది & శ్రీనగర్
    shloka_range:
      start: 29
      end: 41
    description: వితస్తా (జీలమ్) నది ప్రవాహం, శ్రీనగర్ మరియు గుల్మర్గ్ అందాలు.
  - number: 5
    name: మహారాజ కర్ణసింగ్
    shloka_range:
      start: 42
      end: 45
    description: జమ్మూ-కాశ్మీర్ పాలకుడు మహారాజ కర్ణసింగ్ పరిచయం.
  - number: 6
    name: అమరనాథ్ దర్శనం
    shloka_range:
      start: 46
      end: 49
    description: అమరనాథ్ గుహలో మంచు లింగ రూప శివ దర్శనం.
  - number: 7
    name: నేపాల్ & కస్తూరి
    shloka_range:
      start: 50
      end: 54
    description: హిమాలయానికి మస్తకం లాంటి నేపాల్ దేశం, కస్తూరి మృగాల వర్ణన.
  - number: 8
    name: పశుపతినాథ్
    shloka_range:
      start: 55
      end: 61
    description: నేపాల్‌లోని పశుపతినాథ్ స్వామి మహిమ మరియు నామార్థం.
  - number: 9
    name: ఖాట్మండు & మహేంద్ర
    shloka_range:
      start: 66
      end: 78
    description: ఖాట్మండు, గోర్ఖాల శౌర్యం మరియు మహారాజ మహేంద్ర పరిచయం.
  - number: 10
    name: కేదార్‌నాథ్ & బద్రీనాథ్
    shloka_range:
      start: 85
      end: 98
    description: కేదార్‌నాథ్, బద్రీనాథ్ క్షేత్రాలు మరియు శంకరాచార్యుల ప్రస్తావన.
- number: 2
  name: గిరిశ గిరిజా పాణిగ్రహణము
  title: గిరిశగిరిజాపాణిగ్రహోనామ ద్వితీయః సర్గః
  description: హిమవంతుని వివాహము, పార్వతీదేవి జననము, ఆమె కఠోర తపస్సు, శివుని రాక మరియు వివాహ సంప్రదాయాలు - అశ్మారోహణము, లాజహోమము,
    సప్తపది, అగ్ని ప్రదక్షిణలు - పార్వతీదేవి కైలాసమునకు పయనము వరకు వర్ణించు సర్గ.
  end_matter: "మ. మ. వి. వా. కవిశిరోమణినా అలవరతతారపురాభిజనేన దిల్లీనివాసినా \n పం. ప్రభుదత్త శాస్త్రిణా ప్రణీతే 'గణపతి సమ్భవే'\
    \ గిరిశగిరిజాపాణిగ్రహోనామ ద్వితీయః సర్గః సమాప్తః ।"
  name_transliteration: Girisha Girija Panigrahanamu
  shloka_range:
    start: 1
    end: 78
  end: "ఇతి శ్రీ రాజస్థానాలవర-తతారపురజాతజన్మనా దిల్లీనివాసినామ. \n మ. వి. వా. కవిశిరోమణినా పం. ప్రభుదత్త శాస్త్రిణా నిర్మితేగణపతిసమ్భవే\
    \ కావ్యే \n గిరిశగిరిజాపాణిగ్రహోనామ ద్వితీయః సర్గః।"
  topics:
  - number: 1
    name: హిమవంతుని వివాహం
    shloka_range:
      start: 1
      end: 13
    description: హిమవంతుడు మేనకను పెళ్ళాడటం, మైనాకుడి జననం.
  - number: 2
    name: పార్వతీదేవి జననం
    shloka_range:
      start: 14
      end: 20
    description: పార్వతి పుట్టుక మరియు ఆమె బాల్య క్రీడలు.
  - number: 3
    name: కఠిన తపస్సు
    shloka_range:
      start: 21
      end: 25
    description: శివుని వివాహమాడటానికి పార్వతి చేసిన దీక్ష మరియు ప్రార్థన.
  - number: 4
    name: శివుని రాక
    shloka_range:
      start: 26
      end: 32
    description: శివుడు ప్రత్యక్షమై వివాహానికి అంగీకారం తెలుపుట.
  - number: 5
    name: శివుని బరాత్ (పెండ్లి బృందం)
    shloka_range:
      start: 33
      end: 40
    description: ప్రమథ గణాలతో శివుడు కైలాసం నుండి బయలుదేరి వచ్చుట.
  - number: 6
    name: కంకణ మోచనం & కన్యాదానం
    shloka_range:
      start: 41
      end: 49
    description: బంధువుల పరిహాసాలు, బ్రహ్మ ద్వారా శివుని వంశావళి వర్ణన మరియు కన్యాదాన ఘట్టం.
  - number: 7
    name: అశ్మారోహణ & లాజహోమం
    shloka_range:
      start: 50
      end: 55
    description: వధూవరులు సన్నికల్లు తొక్కడం మరియు పేలాలతో లాజహోమం చేయుట.
  - number: 8
    name: అగ్ని ప్రదక్షిణలు & సప్తపది
    shloka_range:
      start: 56
      end: 67
    description: అగ్ని చుట్టూ ప్రదక్షిణలు మరియు సప్తపది (ఏడడుగులు) పరమార్థం.
  - number: 9
    name: గ్రంథిబంధనం & సింధూరం
    shloka_range:
      start: 68
      end: 70
    description: వధూవరుల కొంగుముడి మరియు పాపటలో సింధూర ధారణ.
  - number: 10
    name: పార్వతీదేవి వీడ్కోలు
    shloka_range:
      start: 71
      end: 78
    description: శివునితో కలిసి పార్వతి నందిపై కైలాసానికి పయనం (ప్రయాణోత్సవం).
- number: 3
  name: యోగశక్తి చమత్కృతి
  name_transliteration: Yogashakti Chamatkriti
  shloka_range:
    start: 1
    end: 96
  topics:
  - number: 1
    name: కైలాస పర్వత వర్ణన
    shloka_range:
      start: 1
      end: 9
    description: దేవతల నివాసమైన కైలాస పర్వత సౌందర్యం.
  - number: 2
    name: నీతిశాస్త్ర గుణాల సేవ
    shloka_range:
      start: 10
      end: 26
    description: ఆరు రుతువులు మరియు నీతిశాస్త్ర గుణాలు (సంధి, విగ్రహం, యానం మొదలగునవి) శివపార్వతులకు సేవలు చేయుట.
  - number: 3
    name: శివుని సమాధి
    shloka_range:
      start: 27
      end: 43
    description: శివుడు యోగముద్రలో సమాధి స్థితికి చేరుకుని బ్రహ్మానుభూతి పొందుట.
  - number: 4
    name: మట్టి బొమ్మల నిర్మాణం
    shloka_range:
      start: 44
      end: 55
    description: పార్వతీదేవి ఒంటరిగా ఉన్నప్పుడు మట్టితో ఒక ఎలుకను మరియు బాలుడి బొమ్మను తయారు చేయుట.
  - number: 5
    name: ప్రాణప్రతిష్ఠ
    shloka_range:
      start: 56
      end: 67
    description: పార్వతి తన యోగశక్తితో ఆ మట్టి బొమ్మలకు ప్రాణం పోయుట.
  - number: 6
    name: బాలుడి క్రీడలు & పార్వతి స్నానం
    shloka_range:
      start: 68
      end: 80
    description: ప్రాణం పోసుకున్న బాలుడి ఆటలు, పార్వతి స్నానానికి వెళుతూ కాపలా ఉంచుట.
  - number: 7
    name: బాలుడి ప్రకటన & ప్రేతల వాదన
    shloka_range:
      start: 81
      end: 91
    description: ఎవరినీ లోపలికి రానివ్వనని బాలుడి ప్రకటన, దానిపై ప్రమథ గణాలు (ప్రేతలు) ఆశ్చర్యంతో వాదించుకొనుట.
  - number: 8
    name: శివుని రాక
    shloka_range:
      start: 92
      end: 96
    description: మంగళకరమైన వాతావరణంలో శివుడు తిరిగి వచ్చుట.
  title: యోగశక్తి చమత్కృతిర్నామ తృతీయః సర్గః
  description: కైలాస వైభవము, శివుని యోగ సమాధి, పార్వతీదేవి తన యోగశక్తితో మట్టి బొమ్మలకు ప్రాణం పోయుట, బాలుని ద్వారపాలన మరియు
    శివుని రాక వర్ణించు సర్గ.
  end_matter: "మ. మ. వి. వా. కవిశిరోమణినా అలవరతతారపురాభిజనేన దిల్లీనివాసినా \n పం. ప్రభుదత్త శాస్త్రిణా ప్రణీతే 'గణపతి సమ్భవే'\
    \ యోగశక్తి చమత్కృతిర్నామ తృతీయః సర్గః సమాప్తః ।"
- number: 4
  name: శాస్త్రార్థ శస్త్రీభావము
  name_transliteration: Shastraartha Shastribeevamu
  shloka_range:
    start: 1
    end: 89
  topics:
  - number: 1
    name: శివుని ఆగమనం & ప్రశ్నలు
    shloka_range:
      start: 1
      end: 10
    description: ఇంటికి తిరిగివచ్చిన శివుడిని బాలుడు అడ్డగించడం, శివుడి ప్రశ్నలు.
  - number: 2
    name: మాతృభూమి భక్తి
    shloka_range:
      start: 11
      end: 29
    description: ఇది నా తల్లి ఇల్లు అని, తల్లి ప్రాముఖ్యతపై బాలుడి వాదన.
  - number: 3
    name: పితృత్వ సిద్ధాంతం
    shloka_range:
      start: 30
      end: 47
    description: '''తండ్రి'' అనగా ఎవరు? అనే అంశంపై శివుడు సుదీర్ఘంగా వివరించుట.'
  - number: 4
    name: బాలుడి తార్కిక ఖండన
    shloka_range:
      start: 48
      end: 65
    description: తండ్రి పాత్ర అవసరం లేదని, తల్లులే బిడ్డలను పెంచుతారని బాలుడు జంతువుల ఉదాహరణలతో తార్కికంగా ఖండించుట.
  - number: 5
    name: శివుని క్రోధం & తుది హెచ్చరిక
    shloka_range:
      start: 66
      end: 75
    description: కోపంతో శివుడు బాలుడిని పక్కకు తప్పుకోమని హెచ్చరించుట.
  - number: 6
    name: శిరచ్ఛేదం
    shloka_range:
      start: 76
      end: 79
    description: బాలుడు వెనక్కి తగ్గకపోవడంతో శివుడు త్రిశూలంతో బాలుని తల నరికివేయుట.
  - number: 7
    name: పార్వతి విలాపం
    shloka_range:
      start: 80
      end: 89
    description: విషయం తెలుసుకున్న పార్వతీదేవి పరుగెత్తుకు వచ్చి ఏడ్చుట, శివుడు జరిగిన దానికి సిగ్గుపడుట.
  title: శాస్త్రార్థ శస్త్రీభావో నామ చతుర్థః సర్గః
  description: బాలుడు శివుని అడ్డగించి తండ్రిత్వ సిద్ధాంతంపై వాదోపవాదం, శాస్త్రార్థం శస్త్రంగా మారుట, బాలుని శిరచ్ఛేదం మరియు
    పార్వతీదేవి విలాపం వర్ణించు సర్గ.
  end_matter: "మ. మ. వి. వా. కవిశిరోమణినా అలవరతతారపురాభిజనేన దిల్లీనివాసినా \n పం. ప్రభుదత్త శాస్త్రిణా ప్రణీతే 'గణపతి సమ్భవే'\
    \ శాస్త్రార్థ శస్త్రీభావో నామ చతుర్థః సర్గః సమాప్తః ।"
- number: 5
  name: గజమనుజ యోజనోత్సవము
  name_transliteration: Gajamanuja Yojanothsavamu
  shloka_range:
    start: 1
    end: 78
  topics:
  - number: 1
    name: శివుని పశ్చాత్తాపం & క్షమాపణ
    shloka_range:
      start: 1
      end: 18
    description: పార్వతిని ఓదార్చి, బాలుడిని బ్రతికిస్తానని శివుడు మాటిచ్చుట.
  - number: 2
    name: గజ మస్తకం కోసం అన్వేషణ
    shloka_range:
      start: 19
      end: 36
    description: శివుని ఆజ్ఞతో ప్రమథ గణాలు వెతుకుతూ వెళ్లి, ఉత్తర దిక్కున తలపెట్టుకుని పడుకున్న ఒక ఏనుగు పిల్లను చూసి దాని
      శిరస్సు తీసుకువచ్చుట.
  - number: 3
    name: గజ-మనుజ యోజనం
    shloka_range:
      start: 37
      end: 43
    description: ఆ ఏనుగు తలను బాలుడి మొండెమునకు అతికించి శివుడు ప్రాణదానం చేయుట.
  - number: 4
    name: శివ-పార్వతుల వాత్సల్యం
    shloka_range:
      start: 44
      end: 52
    description: గజముఖుడిగా బ్రతికిన బాలుడిని చూసి శివపార్వతులు సంతోషించుట.
  - number: 5
    name: విద్యాభ్యాసం
    shloka_range:
      start: 53
      end: 58
    description: బాలుడి (గణపతి) బాల్య వినోదాలు మరియు చదువు ప్రారంభం.
  - number: 6
    name: గణాధిపత్యం & యోగినుల నృత్యం
    shloka_range:
      start: 59
      end: 65
    description: శివగణాలకు అధిపతిగా చేయుట, యోగినుల సంతోష నృత్యాలు.
  - number: 7
    name: గంధర్వ గానం
    shloka_range:
      start: 66
      end: 78
    description: గంధర్వుల పాటలు మరియు గణపతి 'సర్వతోభద్ర' చక్ర రూపం దాల్చుట.
  title: గజమనుజయోజనోత్సవో నామ పంచమః సర్గః
  description: శివుని పశ్చాత్తాపం, గజ మస్తకం అన్వేషణ, గజ-మనుజ యోజనంతో గణపతి పునర్జన్మ, బాల్య క్రీడలు, గణాధిపత్యం మరియు గంధర్వ
    గానోత్సవం వర్ణించు సర్గ.
  end_matter: "మ. మ. వి. వా. కవిశిరోమణినా అలవరతతారపురాభిజనేన దిల్లీనివాసినా \n పం. ప్రభుదత్త శాస్త్రిణా ప్రణీతే 'గణపతి సమ్భవే'\
    \ గజమనుజయోజనోత్సవో నామ పంచమః సర్గః సమాప్తః ।"
- number: 6
  name: తాన్తైకదంత ప్రసంగము
  name_transliteration: Tanaaikadanta Prasangamu
  shloka_range:
    start: 1
    end: 88
  topics:
  - number: 1
    name: కుండల & దంత స్తుతి
    shloka_range:
      start: 1
      end: 10
    description: గణపతి కుండలాలు మరియు తెల్లని దంతాల వర్ణన.
  - number: 2
    name: ద్వారపాలకుడిగా గణపతి
    shloka_range:
      start: 11
      end: 18
    description: కైలాస ద్వారం వద్ద గణపతి కాపలా విధులు నిర్వర్తించుట.
  - number: 3
    name: పరశురాముని రాక & అడ్డగింపు
    shloka_range:
      start: 19
      end: 30
    description: గురువు శివుడిని దర్శించుకోవడానికి వచ్చిన పరశురాముడిని గణపతి అడ్డుకొనుట.
  - number: 4
    name: వాగ్యుద్ధం
    shloka_range:
      start: 31
      end: 56
    description: వారిద్దరి మధ్య ఉద్రిక్తమైన వాగ్యుద్ధం మరియు పరస్పర పరిహాసాలు.
  - number: 5
    name: పరశురాముని ప్రహారం (దాడి)
    shloka_range:
      start: 57
      end: 59
    description: ఆగ్రహించిన పరశురాముడు తన గొడ్డలి విసరగా, దానిని గౌరవిస్తూ గణపతి తన ఒక దంతాన్ని కోల్పోవుట (ఏకదంతుడు అగుట).
  - number: 6
    name: హాహాకారాలు & పార్వతి క్రోధం
    shloka_range:
      start: 60
      end: 70
    description: దంతం విరగడం చూసి లోకాలు వణకడం, పార్వతి పరశురామునిపై తీవ్రంగా మండిపడుట.
  - number: 7
    name: విష్ణువు ఆగమనం
    shloka_range:
      start: 71
      end: 82
    description: శ్రీహరి వచ్చి పరిస్థితిని శాంతపరచుట, హరి-హర అభేదం గురించి ఉపదేశించుట.
  - number: 8
    name: శరణాగతి & ఏకదంతోత్సవం
    shloka_range:
      start: 83
      end: 88
    description: పరశురాముడు తప్పు తెలుసుకుని క్షమాపణ వేడుకోగా, 'ఏకదంతోత్సవం' జరుపుట.
  title: తానైకదంత ప్రసంగో నామ షష్ఠః సర్గః
  description: కైలాస ద్వారపాలకుడైన గణపతికి పరశురాముని రాక, వాగ్యుద్ధం, గొడ్డలి దెబ్బకు ఏకదంతుడగుట, విష్ణువు శాంతి కల్పించుట
    మరియు హరి-హర అభేదోపదేశం వర్ణించు సర్గ.
  end_matter: "మ. మ. వి. వా. కవిశిరోమణినా అలవరతతారపురాభిజనేన దిల్లీనివాసినా \n పం. ప్రభుదత్త శాస్త్రిణా ప్రణీతే 'గణపతి సమ్భవే'\
    \ తానైకదంత ప్రసంగో నామ షష్ఠః సర్గః సమాప్తః ।"
- number: 7
  name: మహాభారత లేఖాఖ్యానము
  name_transliteration: Mahabharata Lekhakhyanamu
  shloka_range:
    start: 1
    end: 94
  topics:
  - number: 1
    name: వ్యాస మహర్షి పరిచయం
    shloka_range:
      start: 1
      end: 5
    description: గణపతి యొక్క 12 కొత్త పేర్ల స్మరణ మరియు వ్యాసుని వైశిష్ట్యం.
  - number: 2
    name: రచయిత కోసం ప్రకటన
    shloka_range:
      start: 6
      end: 10
    description: తాను చెప్పే మహాభారతాన్ని నిరవధికంగా రాయడానికి తగిన రచయిత కావాలని వ్యాసుడు కోరుట.
  - number: 3
    name: గణపతి రాక & షరతులు
    shloka_range:
      start: 11
      end: 29
    description: గణపతి వచ్చి రచయితగా ఉంటానని చెప్పడం, ఇరువురి మధ్య 'ఆగకుండా రాయాలి', 'అర్థం చేసుకుని రాయాలి' అనే షరతులు కుదురుట.
  - number: 4
    name: రచన ప్రారంభం
    shloka_range:
      start: 30
      end: 49
    description: '"నారాయణం నమస్కృత్య.." శ్లోకంతో రచన ఆరంభం, వ్యాసుడు చెప్పే వేగానికి దీటుగా గణపతి రాయుట.'
  - number: 5
    name: కూట శ్లోకాలు
    shloka_range:
      start: 50
      end: 62
    description: వేగం తగ్గించడానికి వ్యాసుడు కఠినమైన అర్థం గల 'కూట శ్లోకాలను' ప్రయోగించుట.
  - number: 6
    name: కూట శ్లోకాల వివరణ
    shloka_range:
      start: 63
      end: 79
    description: మహాభారతంలోని కొన్ని కఠిన (కూట) శ్లోకాలకు అంతరార్థాలు మరియు వ్యాఖ్యానం.
  - number: 7
    name: గ్రంథ పూర్తి & వీడ్కోలు
    shloka_range:
      start: 80
      end: 94
    description: మహాభారత రచన పూర్తి కావడం, దేవతల పూలవాన మరియు గణపతికి ఘనమైన వీడ్కోలు పలకడం.
  title: మహాభారత లేఖాఖ్యానో నామ సప్తమః సర్గః
  description: వ్యాస మహర్షి ఆహ్వానంపై గణపతి లేఖకుడిగా వచ్చి మహాభారతాన్ని లిఖించుట, కూట శ్లోకాల రహస్యం, గ్రంథ పూర్తిపై దేవతల
    పుష్పవర్షం వర్ణించు సర్గ.
  end_matter: "మ. మ. వి. వా. కవిశిరోమణినా అలవరతతారపురాభిజనేన దిల్లీనివాసినా \n పం. ప్రభుదత్త శాస్త్రిణా ప్రణీతే 'గణపతి సమ్భవే'\
    \ మహాభారత లేఖాఖ్యానో నామ సప్తమః సర్గః సమాప్తః ।"
- number: 8
  name: దేవమోదకోపహార గ్రహము
  name_transliteration: Devamodakopahara Grahamu
  shloka_range:
    start: 1
    end: 73
  topics:
  - number: 1
    name: గణపతి జన్మదినం
    shloka_range:
      start: 1
      end: 3
    description: జన్మదినం నాడు గణపతి మట్టి లడ్డూలతో ఆడుకొనుట.
  - number: 2
    name: దేవతల బహుమతి
    shloka_range:
      start: 4
      end: 13
    description: ఇంద్రుడు, కుబేరుడు తదితర దేవతలు గణపతికి ఒక దివ్యమైన 'మోదకాన్ని' (లడ్డూను) కానుకగా తెచ్చి దానిని కీర్తించుట.
  - number: 3
    name: పార్వతి వద్ద భద్రత
    shloka_range:
      start: 14
      end: 33
    description: ఆ మోదకాన్ని పార్వతి భద్రపరచడం, కుమారస్వామి మరియు గణపతి మధ్య చిన్నపాటి ఘర్షణ.
  - number: 4
    name: భూప్రదక్షిణ షరతు
    shloka_range:
      start: 34
      end: 39
    description: లడ్డూ కావాలంటే ముల్లోకాలను తిరిగిరావాలని శివపార్వతులు షరతు విధించగా, కుమారస్వామి నెమలిపై వెంటనే పయనం అగుట.
  - number: 5
    name: గణపతి ప్రదక్షిణ
    shloka_range:
      start: 40
      end: 44
    description: గణపతి తన తెలివితో తల్లిదండ్రులకే ప్రదక్షిణ చేసి భూప్రదక్షిణ ఫలాన్ని పొందుట.
  - number: 6
    name: కుమారస్వామి రాక
    shloka_range:
      start: 45
      end: 51
    description: తిరిగివచ్చిన కుమారస్వామి జరిగినది తెలుసుకుని అన్న గణపతి తెలివితేటలను అంగీకరించుట.
  - number: 7
    name: మోదక ప్రాప్తి & వినోదం
    shloka_range:
      start: 52
      end: 64
    description: గణపతి చేతికి లడ్డూ రావడం, దానిపై వాలిన చీమల వల్ల తలెత్తిన హాస్య వాతావరణం.
  - number: 8
    name: చతుర్థి వరప్రదానం
    shloka_range:
      start: 65
      end: 73
    description: గణపతి ఆకాశంలోని చంద్రుడిని అడగగా, పార్వతి 'చతుర్థి' తిథిని అతనికి ప్రీతిపాత్రమైనదిగా వరంగా ఇచ్చుట.
  title: దేవమోదకోపహార గ్రహో నామ అష్టమః సర్గః
  description: దేవతలు అర్పించిన దివ్య మోదకం, కుమారస్వామితో పోటీలో తల్లిదండ్రులను ప్రదక్షిణ చేసి తెలివితో విజయం, చీమల హాస్యం
    మరియు చతుర్థి వరప్రదానం వర్ణించు సర్గ.
  end_matter: "మ. మ. వి. వా. కవిశిరోమణినా అలవరతతారపురాభిజనేన దిల్లీనివాసినా \n పం. ప్రభుదత్త శాస్త్రిణా ప్రణీతే 'గణపతి సమ్భవే'\
    \ దేవమోదకోపహార గ్రహో నామ అష్టమః సర్గః సమాప్తః ।"
- number: 9
  name: గణశాసనోత్కర్షము
  name_transliteration: Ganashanothkarshhamu
  shloka_range:
    start: 1
    end: 66
  topics:
  - number: 1
    name: గణతంత్ర (ప్రజాస్వామ్య) పోలిక
    shloka_range:
      start: 1
      end: 14
    description: గణపతి తత్త్వాన్ని ఆధునిక ప్రజాస్వామ్య (గణతంత్ర) పాలనతో పోల్చడం, ప్రజా సంక్షేమమే పరమావధి అని తెలుపుట.
  - number: 2
    name: ఆదర్శ రాజ్యం
    shloka_range:
      start: 15
      end: 20
    description: దారిద్య్ర నిర్మూలన, అందరికీ నివాసం కల్పించే ఆదర్శ రాజ్య (రామరాజ్య) లక్షణాలు.
  - number: 3
    name: సమానత్వం & కుటుంబ నియంత్రణ
    shloka_range:
      start: 21
      end: 26
    description: స్త్రీ-పురుష సమాన హక్కులు మరియు ఆనాడే గణపతి సూచించిన కుటుంబ నియంత్రణ సంకేతాలు.
  - number: 4
    name: పాలకుడి గుణాలు
    shloka_range:
      start: 27
      end: 31
    description: చిన్న కళ్లు (సూక్ష్మ దృష్టి) మరియు పెద్ద చెవులు (అందరి మాటలు వినడం) ఉత్తమ పాలకుడి లక్షణాలు అని వివరించుట.
  - number: 5
    name: ధర్మ నిరపేక్షత
    shloka_range:
      start: 32
      end: 34
    description: మత ప్రాతిపదికన కాకుండా అందరికీ సమన్యాయం (లౌకికవాదం/సెక్యులరిజం) అందించడం.
  - number: 6
    name: గణేశ అక్షరమాల
    shloka_range:
      start: 35
      end: 40
    description: '''క'' కారం మొదలు ''జ్ఞ'' వరకు అక్షరమాల క్రమంలో గణపతి పేర్ల స్మరణ.'
  - number: 7
    name: ద్వైమాతుర తత్త్వం
    shloka_range:
      start: 41
      end: 47
    description: రెండు తల్లులు (ద్వైమాతుర) ఉండటం వలని ప్రయోజనాలు, మరియు బహుభార్యత్వంలోని దోషాలు.
  - number: 8
    name: పండుగలలో గణపతి
    shloka_range:
      start: 48
      end: 58
    description: దీపావళి దీపాలలో, హోలీ వేడుకల్లో గణపతి ఆంతర్యం మరియు స్థిరత్వానికి మార్గదర్శనం.
  - number: 9
    name: మాతృభూమికి నివాళి
    shloka_range:
      start: 59
      end: 66
    description: భారతమాత పవిత్ర ధూళికి నమస్కారం, దేశం కోసం ప్రాణత్యాగం చేసిన వీరులకు (శహీదులకు) ఘనమైన నివాళి.
  title: గణశాసనోత్కర్షో నామ నవమః సర్గః
  description: గణపతి తత్త్వాన్ని ఆధునిక గణతంత్ర రాజ్యంతో పోల్చుట, ఆదర్శ పాలన, స్త్రీ-పురుష సమానత్వం, ధర్మనిరపేక్షత, గణేశ అక్షరమాల
    మరియు భారతమాత వందనం వర్ణించు సర్గ.
  end_matter: "మ. మ. వి. వా. కవిశిరోమణినా అలవరతతారపురాభిజనేన దిల్లీనివాసినా \n పం. ప్రభుదత్త శాస్త్రిణా ప్రణీతే 'గణపతి సమ్భవే'\
    \ గణశాసనోత్కర్షో నామ నవమః సర్గః సమాప్తః ।"
- number: 10
  name: కావ్యాంతర పుష్పార్పణము
  name_transliteration: Kavyantara Pushparpanamu
  shloka_range:
    start: 1
    end: 90
  topics:
  - number: 1
    name: రాజస్థాన్ వర్ణన
    shloka_range:
      start: 1
      end: 12
    description: రాజస్థాన్, ఆల్వార్ నగరాలు మరియు తతార్‌పూర్ వైభవం.
  - number: 2
    name: కవి స్వీయ చరిత్ర
    shloka_range:
      start: 13
      end: 26
    description: గ్రంథ రచయిత పండిత ప్రభుదత్త శాస్త్రి గారి ఆత్మకథ, ఆయన మిశ్ర వంశ చరిత్ర, తాత మరియు తండ్రి పరిచయం.
  - number: 3
    name: విద్యాభ్యాసం & పురస్కారాలు
    shloka_range:
      start: 27
      end: 36
    description: కవి విద్యాభ్యాసం, ఢిల్లీ ప్రయాణం, గీతా పోటీలు మరియు పాట్నా సాహిత్య సమ్మేళనాలలో పొందిన పురస్కారాలు.
  - number: 4
    name: సమస్యా పూరణాలు
    shloka_range:
      start: 37
      end: 49
    description: కవి రచించిన 'సంస్కృతమ్', 'ఉపాస్మహే', 'తే కే న జానీమహే' వంటి అనేక సమస్యా పూరణాల ఉదాహరణలు.
  - number: 5
    name: జాతీయ పతాకం & గాంధీ
    shloka_range:
      start: 50
      end: 60
    description: భారత జాతీయ జెండా (రాష్ట్రధ్వజం) రూపకల్పన, మహాత్మా గాంధీని గాధి మహర్షితో పోల్చడం, మరియు చరఖా స్తుతి.
  - number: 6
    name: శ్రీరామ కీర్తి కౌస్తుభం
    shloka_range:
      start: 61
      end: 65
    description: సీతా-రాముల వివాహ సమయంలో మిథిల బాలుల పరిహాసం, శ్రీరాముని సమాధానం మరియు ధనుర్ధారణ గల కారణం.
  - number: 7
    name: ఝాన్సీ రాణి & కృష్ణ జననం
    shloka_range:
      start: 66
      end: 70
    description: ఝాన్సీ లక్ష్మీబాయి ధీరత్వం, శ్రీకృష్ణుని జన్మ వృత్తాంతంలో అష్టమి మరియు బుధవారం నాటి విశిష్టత.
  - number: 8
    name: గీతా వ్యంగ్య మందాకిని & సంస్కృతం
    shloka_range:
      start: 71
      end: 78
    description: భగవద్గీతలో వ్యంగ్యార్థం, సంస్కృత భాషా గొప్పదనం, మరియు అనుస్వార-విసర్గల వ్యాకరణ ప్రాముఖ్యత.
  - number: 9
    name: ధన్వంతరి & శంకరాచార్య
    shloka_range:
      start: 79
      end: 86
    description: ధన్వంతరి నామ పరమార్థం, నాటక నాందీ శ్లోకం, మరియు ఆదిశంకరాచార్యుల పాదుకా స్తుతి.
  - number: 10
    name: '''అస్తి'' పద వైశిష్ట్యం'
    shloka_range:
      start: 87
      end: 90
    description: కావ్య ప్రారంభంలో ఉపయోగించిన 'అస్తి' పదానికి ఉన్న లోతైన వ్యాకరణ మరియు వేదాంత (తాత్విక) అర్థాలను వివరించుట.
  title: కావ్యాంతర పుష్పార్పణో నామ దశమః సర్గః
  description: రాజస్థాన్ వైభవం, కవి ప్రభుదత్త శాస్త్రి స్వీయ చరిత్ర, జాతీయ పతాకం, గాంధీ స్ఫూర్తి, ఝాన్సీ లక్ష్మీబాయి శౌర్యం,
    ఆదిశంకరాచార్యుల పాదుకా స్తుతి మరియు 'అస్తి' పద వైశిష్ట్యం వర్ణించు పదవ మరియు అంతిమ సర్గ.
  end_matter: "మ. మ. వి. వా. కవిశిరోమణినా అలవరతతారపురాభిజనేన దిల్లీనివాసినా \n పం. ప్రభుదత్త శాస్త్రిణా ప్రణీతే 'గణపతి సమ్భవే'\
    \ కావ్యాంతర పుష్పార్పణో నామ దశమః సర్గః సమాప్తః ।\n\nఇతి శ్రీ మహాగణపతి సంభవ మహాకావ్యం సమాప్తమ్ ।"
